<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remarkable Study Hub</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A101D; --bg-nav: #141C2F; --nav-active: #2D3E5C;
            --text-white: #FFFFFF; --text-muted: #7D95B9; --accent-teal: #21D0B3;
            --box-bg: #131B2F; --box-border: #1E293B; --book-purple: #3B2A82;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { background-color: var(--bg-dark); color: var(--text-white); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .navbar { background-color: var(--bg-nav); padding: 8px; border-radius: 12px; display: flex; gap: 10px; margin-top: 40px; border: 1px solid var(--box-border); position: sticky; top: 20px; z-index: 100; }
        .nav-item { padding: 10px 24px; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.2s; user-select: none; }
        .nav-item.active { background-color: var(--nav-active); color: var(--accent-teal); }
        
        .container { max-width: 900px; width: 100%; padding: 40px; box-sizing: border-box; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CLOCK & HEADER */
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
        .clock-col { text-align: right; }
        #live-time { font-size: 2.2rem; font-weight: 700; color: var(--accent-teal); text-shadow: 0 0 20px rgba(33, 208, 179, 0.3); line-height: 1; }
        #live-date { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; font-weight: 600; }

        h1 { font-size: 2.8rem; font-weight: 700; margin: 0; }
        .teal-text { color: var(--accent-teal); }

        .quote-box { background: linear-gradient(135deg, #131B2F 0%, #1A2B4C 100%); border-left: 4px solid var(--accent-teal); padding: 30px; border-radius: 0 16px 16px 0; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .quote-text { font-size: 1.1rem; font-style: italic; color: #E2E8F0; line-height: 1.6; white-space: pre-line; }

        .quick-links { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .link-btn { flex: 1; min-width: 140px; padding: 12px; text-align: center; background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 12px; color: var(--text-white); font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.2s; font-size: 0.9rem; }
        .link-btn:hover { border-color: var(--accent-teal); transform: translateY(-2px); }

        .dashboard-panel { background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; }
        .panel-title { font-size: 1rem; font-weight: 700; color: var(--accent-teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }

        /* ACTION NOTES (NEW) */
        .note-input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .notes-list { flex-grow: 1; overflow-y: auto; max-height: 140px; padding-right: 5px; }
        .notes-list::-webkit-scrollbar { width: 6px; }
        .notes-list::-webkit-scrollbar-thumb { background: var(--box-border); border-radius: 10px; }
        .note-item { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; border: 1px solid transparent; transition: 0.2s; }
        .note-item:hover { border-color: var(--box-border); }
        .del-note-btn { background: none; border: none; color: #ff6384; cursor: pointer; font-size: 1rem; padding: 0 5px; opacity: 0.7; }
        .del-note-btn:hover { opacity: 1; }

        /* ATTENDANCE */
        .att-days-grid { display: flex; justify-content: space-between; gap: 10px; margin-top: auto; }
        .att-day-label { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .att-day-label input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent-teal); }

        /* SCHEDULED TESTS */
        .test-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .days-badge { background-color: rgba(33, 208, 179, 0.1); color: var(--accent-teal); padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 0.8rem; }
        .delete-btn { background: none; border: none; color: #ff6384; cursor: pointer; font-size: 1.1rem; }

        /* TRACKER UI */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .book { background-color: var(--book-purple); height: 240px; border-radius: 4px 12px 12px 4px; box-shadow: inset 10px 0 20px rgba(0,0,0,0.3), 5px 5px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .book:hover { transform: translateY(-5px); }
        .book-title { font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; }

        .chapter-card { background-color: var(--box-bg); border: 1px solid var(--box-border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .sub-tasks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-left: 30px; margin-top: 15px; }
        .task-label { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; }

        /* PROGRESS BARS (NEW) */
        .progress-track { width: 100%; background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-teal); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px rgba(33, 208, 179, 0.5); }
        .overall-progress { font-size: 1.2rem; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* FORMS & INPUTS */
        input[type="text"], input[type="date"], input[type="url"], select { width: 100%; padding: 12px; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--box-border); color: white; margin-top: 5px; box-sizing: border-box; font-family: inherit; }
        select { cursor: pointer; }
        .btn { background-color: var(--accent-teal); color: var(--bg-dark); border: none; padding: 12px 24px; font-weight: 700; border-radius: 8px; cursor: pointer; display: inline-block; }
        .btn-purple { background-color: #5D3FD3; color: white; }
        .upload-box { background-color: var(--box-bg); border: 2px dashed var(--box-border); border-radius: 16px; padding: 50px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-item active" onclick="switchTab('home')">Home</div>
        <div class="nav-item" onclick="switchTab('tracker')">Tracker</div>
        <div class="nav-item" onclick="switchTab('tests')">Add Test</div>
        <div class="nav-item" onclick="switchTab('pdf')">PDF Tool</div>
    </div>

    <div class="container">
        <div id="home" class="section active">
            <div class="header-row">
                <div><h1>Hey <span class="teal-text">Shourya</span>,</h1></div>
                <div class="clock-col">
                    <div id="live-time">00:00</div>
                    <div id="live-date">Loading date...</div>
                </div>
            </div>

            <div class="quote-box"><div class="quote-text" id="ai-quote">Summoning inspiration...</div></div>
            
            <div class="quick-links">
                <a href="https://dikshant.schoolpad.in/dashboardFeed/feed" target="_blank" class="link-btn">🏫 SchoolPad</a>
                <button onclick="window.open('https://classroom.google.com', '_blank')" class="link-btn">📝 Classroom</button>
                <a href="https://complete-it-v2-dmkh.onrender.com/" target="_blank" class="link-btn" style="border-color: var(--accent-teal);">✅ Complete It</a>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="dashboard-panel" style="height: 250px;">
                    <span class="panel-title">Action Notes</span>
                    <div class="note-input-row">
                        <input type="text" id="new-note" placeholder="Add a task..." onkeypress="if(event.key==='Enter') addNote()">
                        <button class="btn" style="padding: 0 15px; font-size: 1.2rem;" onclick="addNote()">+</button>
                    </div>
                    <div class="notes-list" id="notes-container"></div>
                </div>

                <div class="dashboard-panel" style="height: 250px;">
                    <span class="panel-title">Weekly Attendance</span>
                    <div style="text-align: center; font-weight: 700; font-size: 2.5rem; margin-top: 10px;" id="att-percent" class="teal-text">0%</div>
                    <div class="att-days-grid">
                        <label class="att-day-label"><input type="checkbox" id="att-0" onchange="calcAttendance()">M</label>
                        <label class="att-day-label"><input type="checkbox" id="att-1" onchange="calcAttendance()">T</label>
                        <label class="att-day-label"><input type="checkbox" id="att-2" onchange="calcAttendance()">W</label>
                        <label class="att-day-label"><input type="checkbox" id="att-3" onchange="calcAttendance()">T</label>
                        <label class="att-day-label"><input type="checkbox" id="att-4" onchange="calcAttendance()">F</label>
                        <label class="att-day-label"><input type="checkbox" id="att-5" onchange="calcAttendance()">S</label>
                    </div>
                </div>
            </div>

            <div class="dashboard-panel" style="margin-top: 20px;">
                <span class="panel-title">Scheduled Tests</span>
                <div id="scheduled-tests-container"><div style="color:var(--text-muted);text-align:center;">All clear.</div></div>
            </div>
        </div>

        <div id="tracker" class="section">
            <div id="notebook-grid" class="book-grid">
                <div class="book" onclick="openSubject('Maths')"><div class="book-title">MATHS</div></div>
                <div class="book" onclick="openSubject('Physics')"><div class="book-title">PHYSICS</div></div>
                <div class="book" onclick="openSubject('Chemistry')"><div class="book-title">CHEMISTRY</div></div>
                <div class="book" onclick="openSubject('Biology')"><div class="book-title">BIOLOGY</div></div>
            </div>
            <div id="chapter-view" style="display:none;">
                <button class="btn" style="background:var(--box-border); color:white; margin-bottom:20px;" onclick="closeSubject()">← Back to Notebooks</button>
                
                <div class="overall-progress">
                    <h2 id="subject-title" class="teal-text" style="margin:0;"></h2>
                    <div id="subject-progress-text">0% Completed</div>
                </div>

                <div id="chapter-list-container"></div>
            </div>
        </div>

        <div id="tests" class="section">
            <div class="chapter-card" style="max-width: 450px; margin: auto;">
                <span class="panel-title">Schedule New Test</span>
                <form id="add-test-form">
                    <div style="margin-bottom:15px;">
                        <label>Select Syllabus Topic</label>
                        <select id="test-dropdown" onchange="toggleCustomTest()" required></select>
                        <input type="text" id="test-custom" placeholder="Type custom test name..." style="display:none; margin-top:10px;">
                    </div>
                    <div style="margin-bottom:15px;"><label>Date</label><input type="date" id="test-date" required></div>
                    <div style="margin-bottom:15px;"><label>PDF Link</label><input type="url" id="test-link" placeholder="G-Drive Link" required></div>
                    <button type="submit" class="btn" style="width: 100%;">Schedule Test</button>
                </form>
            </div>
        </div>

        <div id="pdf" class="section">
            <div class="upload-box" onclick="document.getElementById('pdf-upload').click();">
                <div style="font-size:3rem; margin-bottom:15px;">🚀</div>
                <div id="upload-text" style="font-weight:600;">Drop PDF for Remarkable Dark Mode</div>
                <input type="file" id="pdf-upload" style="display: none;" accept="application/pdf" onchange="handlePDFUpload(event)">
                <br>
                <a href="https://my.remarkable.com/" target="_blank" id="remarkable-btn" class="btn btn-purple" style="display: none; margin-top: 15px;">reMarkable Cloud ↗</a>
                <button id="reset-pdf-btn" class="btn" style="display: none; margin-top: 15px; background: var(--box-border); color: white;" onclick="resetPDFTool(event)">Another One</button>
            </div>
        </div>
    </div>

    <script>
        // SYLLABUS DATA
        const syllabusData = {
            "Maths": ["Real Numbers", "Polynomials", "Linear Equations", "Quadratic Equations", "Arithmetic Progressions", "Triangles", "Coordinate Geometry", "Trigonometry", "Circles", "Surface Areas", "Statistics", "Probability"],
            "Physics": ["Light", "Human Eye", "Electricity", "Magnetic Effects", "Sources of Energy"],
            "Chemistry": ["Chemical Reactions", "Acids, Bases & Salts", "Metals & Non-Metals", "Carbon Compounds", "Periodic Classification"],
            "Biology": ["Life Processes", "Control & Coordination", "Reproduction", "Heredity", "Environment", "Resources"]
        };
        const subTasks = ["NCERT", "Question Bank", "One-Shot", "Worksheet"];

        // STATE MANAGEMENT
        let trackerState = JSON.parse(localStorage.getItem('studyTracker')) || {};
        let tests = JSON.parse(localStorage.getItem('scheduledTests')) || [];
        let attendanceState = JSON.parse(localStorage.getItem('weeklyAttendance')) || [false, false, false, false, false, false];
        let actionNotes = JSON.parse(localStorage.getItem('actionNotes')) || [];
        let currentSubject = "";

        // UI NAVIGATION
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // CLOCK
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            document.getElementById('live-date').innerText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);

        // ACTION NOTES (NEW LOGIC)
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '';
            if(actionNotes.length === 0) { container.innerHTML = '<div style="color:var(--text-muted);font-size:0.9rem;text-align:center;margin-top:20px;">No pending tasks. You\'re all caught up!</div>'; return; }
            actionNotes.forEach((note, index) => {
                container.innerHTML += `<div class="note-item"><span>${note}</span> <button class="del-note-btn" onclick="deleteNote(${index})">✖</button></div>`;
            });
        }
        function addNote() {
            const input = document.getElementById('new-note');
            const text = input.value.trim();
            if (text) {
                actionNotes.push(text);
                localStorage.setItem('actionNotes', JSON.stringify(actionNotes));
                input.value = '';
                renderNotes();
            }
        }
        function deleteNote(index) {
            actionNotes.splice(index, 1);
            localStorage.setItem('actionNotes', JSON.stringify(actionNotes));
            renderNotes();
        }

        // ATTENDANCE
        function calcAttendance() {
            const checks = Array.from({length:6}, (_,i) => document.getElementById('att-'+i).checked);
            localStorage.setItem('weeklyAttendance', JSON.stringify(checks));
            document.getElementById('att-percent').innerText = Math.round((checks.filter(c => c).length/6)*100) + '%';
        }

        // DYNAMIC TEST DROPDOWN (NEW LOGIC)
        function populateTestDropdown() {
            const select = document.getElementById('test-dropdown');
            select.innerHTML = '<option value="" disabled selected>Select Chapter...</option>';
            for (const sub in syllabusData) {
                const group = document.createElement('optgroup');
                group.label = sub;
                syllabusData[sub].forEach(ch => { group.innerHTML += `<option value="${sub}: ${ch}">${ch}</option>`; });
                select.appendChild(group);
            }
            select.innerHTML += '<option value="OTHER" style="font-weight:bold; color:var(--accent-teal);">+ Other (Custom Name)</option>';
        }
        function toggleCustomTest() {
            const select = document.getElementById('test-dropdown');
            const customInput = document.getElementById('test-custom');
            if (select.value === "OTHER") { customInput.style.display = 'block'; customInput.required = true; } 
            else { customInput.style.display = 'none'; customInput.required = false; }
        }

        document.getElementById('add-test-form').onsubmit = (e) => {
            e.preventDefault();
            const selectVal = document.getElementById('test-dropdown').value;
            const finalTopic = selectVal === "OTHER" ? document.getElementById('test-custom').value : selectVal;
            tests.push({ c: finalTopic, d: document.getElementById('test-date').value, l: document.getElementById('test-link').value });
            tests.sort((a,b) => new Date(a.d) - new Date(b.d));
            localStorage.setItem('scheduledTests', JSON.stringify(tests));
            updateTestDashboard();
            alert("Test Scheduled!"); switchTab('home');
            document.getElementById('add-test-form').reset();
            toggleCustomTest(); // Hide custom box again
        };

        function removeTest(i) { if(confirm("Delete this test?")) { tests.splice(i, 1); localStorage.setItem('scheduledTests', JSON.stringify(tests)); updateTestDashboard(); } }
        function updateTestDashboard() {
            const c = document.getElementById('scheduled-tests-container');
            if (tests.length === 0) { c.innerHTML = `<div style="color:var(--text-muted);text-align:center;">All clear.</div>`; return; }
            c.innerHTML = '';
            tests.forEach((t, i) => {
                const diff = Math.ceil((new Date(t.d) - new Date().setHours(0,0,0,0))/(1000*60*60*24));
                c.innerHTML += `<div class="test-item"><div><b style="color:var(--text-white);">${t.c}</b><br><a href="${t.l}" target="_blank" style="color:var(--accent-teal);font-size:0.8rem;text-decoration:none;">View PDF ↗</a></div><div style="display:flex;gap:15px;align-items:center;"><div class="days-badge">${diff <= 0 ? "Today" : diff + " days"}</div><button class="delete-btn" onclick="removeTest(${i})">✖</button></div></div>`;
            });
        }

        // TRACKER & LIVE PROGRESS BARS (NEW LOGIC)
        function openSubject(sub) {
            currentSubject = sub;
            document.getElementById('notebook-grid').style.display = 'none';
            document.getElementById('chapter-view').style.display = 'block';
            document.getElementById('subject-title').innerText = sub;
            const container = document.getElementById('chapter-list-container');
            container.innerHTML = '';
            
            syllabusData[sub].forEach((ch, i) => {
                const id = `${sub}-${i}`;
                let tasksHTML = '';
                subTasks.forEach((t, tIdx) => { 
                    const subId = `${id}-sub-${tIdx}`;
                    const isChecked = trackerState[subId] ? 'checked' : '';
                    tasksHTML += `<label class="task-label"><input type="checkbox" id="${subId}" class="${id}-sub" onchange="checkParent('${id}','${subId}')" ${isChecked}> ${t}</label>`; 
                });
                const isMChecked = trackerState[id+'-m'] ? 'checked' : '';
                container.innerHTML += `
                    <div class="chapter-card">
                        <div style="display:flex;align-items:center;gap:15px;font-weight:700;">
                            <input type="checkbox" id="${id}-m" onchange="toggleSubs('${id}')" ${isMChecked}>${ch}
                        </div>
                        <div class="progress-track"><div class="progress-fill" id="bar-${id}"></div></div>
                        <div class="sub-tasks">${tasksHTML}</div>
                    </div>`;
            });
            updateProgressBars();
        }

        function closeSubject() { document.getElementById('chapter-view').style.display = 'none'; document.getElementById('notebook-grid').style.display = 'grid'; currentSubject = ""; }

        function toggleSubs(id) { 
            const m = document.getElementById(id+'-m').checked; trackerState[id+'-m'] = m;
            document.querySelectorAll('.'+id+'-sub').forEach(b => { b.checked = m; trackerState[b.id] = m; });
            localStorage.setItem('studyTracker', JSON.stringify(trackerState)); 
            updateProgressBars();
        }

        function checkParent(id, subId) { 
            trackerState[subId] = document.getElementById(subId).checked;
            const all = Array.from(document.querySelectorAll('.'+id+'-sub')).every(b => b.checked);
            document.getElementById(id+'-m').checked = all; trackerState[id+'-m'] = all;
            localStorage.setItem('studyTracker', JSON.stringify(trackerState)); 
            updateProgressBars();
        }

        function updateProgressBars() {
            if(!currentSubject) return;
            let totalSubTasksForSubject = 0;
            let completedSubTasksForSubject = 0;

            syllabusData[currentSubject].forEach((ch, i) => {
                const id = `${currentSubject}-${i}`;
                let chapterCompletedCount = 0;
                
                subTasks.forEach((_, tIdx) => {
                    totalSubTasksForSubject++;
                    if(trackerState[`${id}-sub-${tIdx}`]) {
                        chapterCompletedCount++;
                        completedSubTasksForSubject++;
                    }
                });

                // Update Chapter Bar
                const chapPercent = (chapterCompletedCount / subTasks.length) * 100;
                const bar = document.getElementById(`bar-${id}`);
                if(bar) bar.style.width = `${chapPercent}%`;
            });

            // Update Total Subject Text
            const overallPercent = totalSubTasksForSubject === 0 ? 0 : Math.round((completedSubTasksForSubject / totalSubTasksForSubject) * 100);
            document.getElementById('subject-progress-text').innerText = `${overallPercent}% Syllabus Covered`;
        }

        // PDF API TOOL
        function handlePDFUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const txt = document.getElementById('upload-text');
            txt.innerText = "Inverting Colors..."; 
            const fd = new FormData(); fd.append('pdf_file', file);
            fetch('/api/convert', {method: 'POST', body: fd}).then(r => r.blob()).then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "DARK_"+file.name; a.click();
                txt.innerText = "Done!"; document.getElementById('remarkable-btn').style.display = 'inline-block'; document.getElementById('reset-pdf-btn').style.display = 'inline-block';
            });
        }
        function resetPDFTool(e) { e.stopPropagation(); document.getElementById('upload-text').innerText = "Drop PDF for Remarkable Dark Mode"; document.getElementById('pdf-upload').value = ""; document.getElementById('remarkable-btn').style.display = 'none'; document.getElementById('reset-pdf-btn').style.display = 'none'; }

        // INITIALIZE ON LOAD
        window.onload = function() {
            updateClock();
            renderNotes();
            populateTestDropdown();
            attendanceState.forEach((val, i) => { document.getElementById('att-'+i).checked = val; });
            calcAttendance();
            updateTestDashboard();
            fetch('/api/quote').then(r => r.json()).then(d => document.getElementById('ai-quote').innerText = d.quote);
        };
    </script>
</body>
</html>
